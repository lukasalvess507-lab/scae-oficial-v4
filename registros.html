<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Resumo do Dia</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(#1e3c72, #2a5298);
    color: white;
    text-align: center;
}

.container {
    background: #fff;
    color: #000;
    margin: 50px auto;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 400px;
}

select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

.aluno {
    text-align: left;
    padding: 10px;
    border-bottom: 1px solid #ccc;
}

.total {
    font-size: 20px;
    font-weight: bold;
    margin-top: 15px;
}
</style>

</head>
<body>

<h1>S.C.A.E</h1>
<p>Resumo do Dia</p>

<div class="container">

<select id="filtroTurma">
    <option value="todas">Todas as turmas</option>
</select>

<div id="lista"></div>

<div class="total" id="total">Total: 0 alunos</div>

<button onclick="window.history.back()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.firebasestorage.app",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const total = document.getElementById("total");
const filtro = document.getElementById("filtroTurma");

let alunosMap = {};
let registros = [];

onSnapshot(collection(db, "alunos"), (snapshot) => {
    alunosMap = {};

    snapshot.forEach(doc => {
        const d = doc.data();
        alunosMap[String(d.codigo)] = {
            nome: d.nome,
            turma: d.turma
        };
    });

    renderizar();
});

onSnapshot(collection(db, "leituras"), (snapshot) => {

    registros = [];

    const hoje = new Date().toISOString().split("T")[0];

    snapshot.forEach(doc => {
        const d = doc.data();

        if (d.data !== hoje) return;

        registros.push(d);
    });

    renderizar();
});

function renderizar() {

    lista.innerHTML = "";

    let contador = 0;
    const turmaSelecionada = filtro.value;

    registros.forEach(r => {

        const aluno = alunosMap[String(r.codigo)];

        const nome = aluno ? aluno.nome : "Aluno não encontrado";
        const turma = aluno ? aluno.turma : "Sem turma";

        if (turmaSelecionada !== "todas" && turma !== turmaSelecionada) return;

        contador++;

        lista.innerHTML += `
            <div class="aluno">
                <strong>${nome}</strong><br>
                Código: ${r.codigo}<br>
                Turma: ${turma}
            </div>
        `;
    });

    total.innerText = "Total: " + contador + " alunos";
}

filtro.addEventListener("change", renderizar);

</script>

</body>
</html>
