<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resumo do Dia</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a5f, #2a4d69);
  color: white;
  text-align: center;
  padding: 20px;
}

.container{
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
}

.total{
  font-size: 28px;
  margin-bottom: 15px;
  font-weight: bold;
}

.item{
  text-align: left;
  padding: 10px;
  border-bottom: 1px solid #ccc;
}

.nome{
  font-weight: bold;
}

.turma{
  font-size: 12px;
  color: gray;
}

select{
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
}

button{
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
  background: #1f4d2e;
  color: white;
}
</style>
</head>

<body>

<h2>Resumo do Dia</h2>

<div class="container">

<div class="total" id="total">0 alunos</div>

<select id="filtroTurma">
  <option value="">Todas as turmas</option>
</select>

<div id="lista"></div>

<button onclick="window.history.back()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const totalDiv = document.getElementById("total");
const filtroTurma = document.getElementById("filtroTurma");

const escolaId = localStorage.getItem("escola");
const hoje = new Date().toISOString().split("T")[0];

let dados = [];

async function carregarResumo(){

  const q = query(
    collection(db, "leituras"),
    where("data", "==", hoje),
    where("escolaId", "==", escolaId)
  );

  const snapshot = await getDocs(q);

  lista.innerHTML = "";
  dados = [];

  for(const docSnap of snapshot.docs){

    const leitura = docSnap.data();
    const codigo = leitura.codigo;

    const alunosSnap = await getDocs(
      query(
        collection(db, "alunos"),
        where("codigo", "==", codigo),
        where("escolaId", "==", escolaId)
      )
    );

    alunosSnap.forEach(alunoDoc => {

      const aluno = alunoDoc.data();

      dados.push(aluno);

    });
  }

  preencherTurmas();
  renderizarLista();
}

function preencherTurmas(){

  const turmas = new Set();

  dados.forEach(aluno => {
    turmas.add(aluno.turma);
  });

  turmas.forEach(turma => {
    const option = document.createElement("option");
    option.value = turma;
    option.textContent = turma;
    filtroTurma.appendChild(option);
  });
}

function renderizarLista(){

  lista.innerHTML = "";
  let total = 0;

  const turmaSelecionada = filtroTurma.value;

  dados.forEach(aluno => {

    if(turmaSelecionada && aluno.turma !== turmaSelecionada) return;

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="nome">${aluno.codigo} - ${aluno.nome}</div>
      <div class="turma">${aluno.turma}</div>
    `;

    lista.appendChild(div);
    total++;
  });

  totalDiv.textContent = total + " alunos";
}

filtroTurma.addEventListener("change", renderizarLista);

carregarResumo();

</script>

</body>
</html>
