<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>S.C.A.E</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(#1e3c72, #2a5298);
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  background: white;
  color: black;
  width: 90%;
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background-color: #2e7d32;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #1b5e20;
}
</style>
</head>

<body>

<h1>S.C.A.E</h1>
<p>Cadastrar Aluno</p>

<div class="container">

<input id="codigo" placeholder="Código (ex: 001)">
<input id="nome" placeholder="Nome">
<input id="turma" placeholder="Turma">

<button onclick="salvarAluno()">Salvar</button>

<button onclick="window.history.back()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.salvarAluno = async function () {
  const codigo = document.getElementById("codigo").value.trim();
  const nome = document.getElementById("nome").value.trim();
  const turma = document.getElementById("turma").value.trim();
  const escolaId = localStorage.getItem("escola");

  if (!codigo || !nome || !turma) {
    alert("Preencha todos os campos!");
    return;
  }

  if (!escolaId) {
    alert("Erro: escola não identificada. Faça login novamente.");
    return;
  }

  try {
    await addDoc(collection(db, "alunos"), {
      codigo: codigo,
      nome: nome,
      turma: turma,
      escolaId: escolaId
    });

    alert("Aluno cadastrado com sucesso!");

    document.getElementById("codigo").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("turma").value = "";

  } catch (e) {
    console.error(e);
    alert("Erro ao salvar aluno");
  }
};

</script>

</body>
</html>
