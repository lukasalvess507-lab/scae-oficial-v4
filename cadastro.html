<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastrar Aluno</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:300px;
    margin:50px auto;
}

input{
    width:90%;
    padding:10px;
    margin:5px;
}

button{
    width:95%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<h3>Cadastrar Aluno</h3>

<input type="text" id="codigo" placeholder="Código">
<input type="text" id="nome" placeholder="Nome do aluno">
<input type="text" id="turma" placeholder="Turma">

<button onclick="salvar()">Salvar</button>

<p id="msg"></p>

<button onclick="voltar()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    
const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.salvar = async function() {
    
// alert("clicou salvar");
    
  let escolaId = localStorage.getItem("escola");

  if (!escolaId) {
    alert("Erro: escola não identificada. Faça login novamente.");
    return;
  }

  const codigo = document.getElementById("codigo").value;
  const nome = document.getElementById("nome").value;
  const turma = document.getElementById("turma").value;

  if (!codigo || !nome || !turma) {
    document.getElementById("msg").innerText = "Preencha todos os campos!";
    return;
  }

  await addDoc(
    collection(db, "escolas", escolaId, "alunos"),
    {
      escola: escolaId,
      codigo: codigo,
      nome: nome,
      turma: turma
    }
  );

  document.getElementById("msg").innerText = "Aluno cadastrado com sucesso";

    document.getElementById("codigo").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("turma").value = "";
}

window.voltar = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
