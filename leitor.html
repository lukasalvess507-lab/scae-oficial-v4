<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor QR Code</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color: white;
    text-align: center;
    padding: 20px;
}

#reader{
    width: 100%;
    max-width: 300px;
    margin: auto;
}

#status{
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
}

.barra-container{
    width: 100%;
    max-width: 300px;
    height: 10px;
    background: #ccc;
    margin: 10px auto;
    border-radius: 5px;
    overflow: hidden;
}

#barra{
    height: 100%;
    width: 0%;
    transition: 0.3s;
}

button{
    width: 100%;
    max-width: 300px;
    padding: 12px;
    margin-top: 10px;
    background: #1f4d2e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Leitor QR Code</h2>

<div id="reader"></div>

<div id="status">Clique em iniciar</div>

<div class="barra-container">
    <div id="barra"></div>
</div>


<button onclick="window.history.back()">Voltar</button>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.firebasestorage.app",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 LEITOR

let html5QrCode;
let bloqueado = false;
let tempoBloqueio = 2000;

const status = document.getElementById("status");
const barra = document.getElementById("barra");

function beep(){
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}

function mostrar(msg, cor){
    status.innerText = msg;
    barra.style.background = cor;
    barra.style.width = "100%";
}

function resetar(){
    setTimeout(()=>{
        barra.style.width = "0%";
        status.innerText = "Aguardando leitura...";
        bloqueado = false;
    }, tempoBloqueio);
}

function hoje(){
    const d = new Date();
    return d.toISOString().split("T")[0]; // YYYY-MM-DD
}

async function processarCodigo(codigo){

    if(bloqueado) return;

    bloqueado = true;

    const dataHoje = hoje();
    const id = codigo + "_" + dataHoje;

    try {

        const ref = doc(db, "leituras", id);
        const snap = await getDoc(ref);

        if(snap.exists()){
            mostrar("Já registrado hoje!", "red");
        } else {

            await setDoc(ref, {
                codigo: codigo,
                data: dataHoje,
                timestamp: new Date()
            });

            beep();
            mostrar("Presença registrada!", "green");
        }

    } catch(e){
        console.log(e);
        mostrar("Erro ao salvar", "red");
    }

    resetar();
}

function iniciarCamera(){

    html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {

        if(devices.length){

            const traseira = devices[devices.length - 1];

            html5QrCode.start(
                traseira.id,
                { fps: 10, qrbox: 250 },
                (decodedText) => processarCodigo(decodedText)
            );

            status.innerText = "Câmera iniciada...";

        } else {
            alert("Sem câmera");
        }

    }).catch(err => {
        alert("Erro ao abrir câmera");
        console.log(err);
    });

}
window.onload = iniciarCamera;
</script>

</body>
</html>
