<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor QR Code</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color: white;
    text-align: center;
    padding: 20px;
}

#reader{
    width: 100%;
    max-width: 300px;
    margin: auto;
}

#status{
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
}

.barra-container{
    width: 100%;
    max-width: 300px;
    height: 10px;
    background: #ccc;
    margin: 10px auto;
    border-radius: 5px;
    overflow: hidden;
}

#barra{
    height: 100%;
    width: 0%;
    transition: 0.3s;
}

button{
    width: 100%;
    max-width: 300px;
    padding: 12px;
    margin-top: 10px;
    background: #1f4d2e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Leitor QR Code</h2>

<div id="reader"></div>

<div id="status">Clique em iniciar</div>

<div class="barra-container">
    <div id="barra"></div>
</div>

<button onclick="iniciarCamera()">Iniciar Câmera</button>
<button onclick="reiniciarLeitor()">Reiniciar Leitor</button>

<script>

let html5QrCode;
let bloqueado = false;
let ultimoCodigo = "";

const status = document.getElementById("status");
const barra = document.getElementById("barra");

function beep(){
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();
}

function mostrarSucesso(msg){
    status.innerText = msg;
    barra.style.background = "green";
    barra.style.width = "100%";
}

function mostrarErro(msg){
    status.innerText = msg;
    barra.style.background = "red";
    barra.style.width = "100%";
}

function liberar(){
    setTimeout(()=>{
        status.innerText = "Aguardando leitura...";
        barra.style.width = "0%";
        bloqueado = false;
    },3000);
}

function processarCodigo(codigo){

    if(bloqueado){
        mostrarErro("Leitura repetida!");
        return;
    }

    if(codigo === ultimoCodigo){
        mostrarErro("QR Code já lido!");
        return;
    }

    bloqueado = true;
    ultimoCodigo = codigo;

    beep();
    mostrarSucesso("Leitura realizada!");

    // 🔥 AQUI depois você liga com Firebase
    // exemplo:
    // salvarLeitura(codigo);

    liberar();
}

function iniciarCamera(){

    html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {

        if(devices && devices.length){

            const camera = devices.find(d => d.label.toLowerCase().includes("back")) || devices[0];

            html5QrCode.start(
                camera.id,
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    processarCodigo(decodedText);
                }
            );

        }else{
            alert("Sem câmera");
        }

    }).catch(err => {
        alert("Erro ao abrir câmera");
        console.log(err);
    });

}

function reiniciarLeitor(){

    if(html5QrCode){
        html5QrCode.stop().then(()=>{
            iniciarCamera();
        }).catch(()=>{
            iniciarCamera();
        });
    }else{
        iniciarCamera();
    }

}

</script>

</body>
</html>
