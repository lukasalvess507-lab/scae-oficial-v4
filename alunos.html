<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ver Alunos</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
}

.container{
    background:white;
    padding:20px;
    border-radius:12px;
    max-width:400px;
    margin:40px auto;
}

.card{
    background:#eee;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    text-align:left;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    color:white;
}

.btn-voltar{
    background:#1f4d2e;
}

.acoes{
    display: flex;
    gap: 8px;
    margin-top: 10px;
}

.btn-editar, .btn-excluir{
    flex: 1;
    padding: 6px;
    font-size: 12px;
    border-radius: 6px;
    border: none;
    color: white;
    cursor: pointer;
}

.btn-editar{
    background: #007bff;
}

.btn-excluir{
    background: #dc3545;
}

select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h3>Lista de Alunos</h3>

<select id="filtroTurma" onchange="filtrar()">
    <option value="todas">Todas as turmas</option>
</select>

<div id="lista"></div>

<button class="btn-voltar" onclick="voltar()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const escolaId = localStorage.getItem("escola");

let todosAlunos = [];

async function carregar(){

    const snapshot = await getDocs(collection(db, "alunos"));

    const turmasSet = new Set();

    todosAlunos = [];

    snapshot.forEach(docSnap => {
  const aluno = docSnap.data();
  aluno.id = docSnap.id;

  if (aluno.escola === escolaId) {
    todosAlunos.push(aluno);
    turmasSet.add(aluno.turma);
  }
});

    const select = document.getElementById("filtroTurma");
    select.innerHTML = '<option value="todas">Todas as turmas</option>';

    turmasSet.forEach(turma => {
        const option = document.createElement("option");
        option.value = turma;
        option.textContent = turma;
        select.appendChild(option);
    });

    mostrar(todosAlunos);
}

function mostrar(lista){

    const div = document.getElementById("lista");
    div.innerHTML = "";

    lista.forEach(aluno => {

        div.innerHTML += `
        <div class="card">
            <b>Código:</b> ${aluno.codigo}<br>
            <b>Nome:</b> ${aluno.nome}<br>
            <b>Turma:</b> ${aluno.turma}

            <div class="acoes">
    <button class="btn-editar" onclick="editar('${aluno.id}','${aluno.nome}','${aluno.turma}')">Editar</button>
    <button class="btn-excluir" onclick="excluir('${aluno.id}')">Excluir</button>
</div>
        `;
    });
}

window.filtrar = function(){

    const turma = document.getElementById("filtroTurma").value;

    if(turma === "todas"){
        mostrar(todosAlunos);
    } else {
        const filtrados = todosAlunos.filter(a => a.turma === turma);
        mostrar(filtrados);
    }
}

window.editar = async function(id, nomeAtual, turmaAtual){

    const novoNome = prompt("Editar nome:", nomeAtual);
    const novaTurma = prompt("Editar turma:", turmaAtual);

    if(!novoNome || !novaTurma) return;

    await updateDoc(doc(db, "alunos", id), {
        nome: novoNome,
        turma: novaTurma
    });
    

    alert("Aluno atualizado");
    carregar();
}

window.excluir = async function(id){

    const confirmar = confirm("Deseja excluir este aluno?");

    if(!confirmar) return;

    await deleteDoc(doc(db, "alunos", id));

    alert("Aluno excluído");
    carregar();
}

window.voltar = function(){
    window.location.href = "index.html";
}

carregar();

</script>

</body>
</html>
