<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ver Alunos</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a5f, #2a4d69);
  color: white;
  text-align: center;
  padding: 20px;
}

.container{
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
}

select{
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
}

.aluno{
  text-align: left;
  padding: 10px;
  border-bottom: 1px solid #ccc;
}

.nome{
  font-weight: bold;
}

.turma{
  font-size: 12px;
  color: gray;
}

button{
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #1f4d2e;
  color: white;
}

.excluir{
  background: red;
  margin-top: 5px;
}
</style>
</head>

<body>

<h2>Lista de Alunos</h2>

<div class="container">

<select id="filtroTurma">
  <option value="">Todas as turmas</option>
</select>

<div id="lista"></div>

<button onclick="window.history.back()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const filtro = document.getElementById("filtroTurma");

const escolaId = localStorage.getItem("escola");

if(!escolaId){
  alert("Erro: faça login novamente");
  window.location.href = "login.html";
}

let alunos = [];

async function carregarAlunos(){

  const q = query(
    collection(db, "alunos"),
    where("escolaId", "==", escolaId)
  );

  const snapshot = await getDocs(q);

  alunos = [];

  let turmasSet = new Set();

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    alunos.push({
      id: docSnap.id,
      ...data
    });

    turmasSet.add(data.turma);
  });

  preencherFiltro([...turmasSet]);
  mostrarAlunos();
}

function preencherFiltro(turmas){
  turmas.forEach(t => {
    const op = document.createElement("option");
    op.value = t;
    op.textContent = t;
    filtro.appendChild(op);
  });
}

filtro.addEventListener("change", mostrarAlunos);

function mostrarAlunos(){

  lista.innerHTML = "";

  const turmaSelecionada = filtro.value;

  alunos
    .filter(a => !turmaSelecionada || a.turma === turmaSelecionada)
    .forEach(a => {

      const div = document.createElement("div");
      div.className = "aluno";

      div.innerHTML = `
        <div class="nome">${a.codigo} - ${a.nome}</div>
        <div class="turma">${a.turma}</div>
        <button class="excluir" onclick="excluirAluno('${a.id}')">Excluir</button>
      `;

      lista.appendChild(div);
    });
}

window.excluirAluno = async function(id){

  if(confirm("Deseja excluir este aluno?")){

    await deleteDoc(doc(db, "alunos", id));

    alert("Aluno excluído!");

    carregarAlunos();
  }
}

carregarAlunos();

</script>

</body>
</html>
