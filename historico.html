<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Histórico</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a5f, #2a4d69);
  color: white;
  text-align: center;
  padding: 20px;
}

.container{
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
}

.item{
  text-align: left;
  padding: 10px;
  border-bottom: 1px solid #ccc;
}

.data{
  font-size: 12px;
  color: gray;
}

input{
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
}

button{
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

.pdf{
  background: #f5f5f5;
  color: #333;
  border: 1px solid #ddd;
  transition: 0.2s;
}

.pdf:hover{
  background: #e0e0e0;
}

.voltar{
  background: #1f4d2e;
  color: white;
}
</style>
</head>

<body>

<h2>Histórico</h2>

<div class="container">

<input type="date" id="dataFiltro">

<div id="lista"></div>

<button class="pdf" onclick="exportarPDF()">Exportar PDF</button>
<button class="voltar" onclick="window.history.back()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const dataFiltro = document.getElementById("dataFiltro");

const escolaId = localStorage.getItem("escola");

let dados = [];

async function carregar(){

  const snapshot = await getDocs(collection(db, "leituras"));

  lista.innerHTML = "";
  dados = [];

  for(const docSnap of snapshot.docs){

    const leitura = docSnap.data();

    if(leitura.escolaId !== escolaId) continue;

    const alunosSnap = await getDocs(
      query(
        collection(db, "alunos"),
        where("codigo", "==", leitura.codigo),
        where("escolaId", "==", escolaId)
      )
    );

    alunosSnap.forEach(alunoDoc => {

      const aluno = alunoDoc.data();

      dados.push({
        ...aluno,
        data: leitura.data
      });

    });
  }

  renderizar();
}

function renderizar(){

  lista.innerHTML = "";

  const filtro = dataFiltro.value;

  dados.forEach(item => {

    if(filtro && item.data !== filtro) return;

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <strong>${item.codigo} - ${item.nome}</strong>
      <div>${item.turma}</div>
      <div class="data">${item.data}</div>
    `;

    lista.appendChild(div);
  });
}

dataFiltro.addEventListener("change", renderizar);

async function exportarPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  doc.text("Relatório de Leituras", 10, y);
  y += 10;

  dados.forEach(item => {

    doc.text(
      `${item.codigo} - ${item.nome} | ${item.turma} | ${item.data}`,
      10,
      y
    );

    y += 8;

    if(y > 280){
      doc.addPage();
      y = 10;
    }

  });

  doc.save("relatorio.pdf");
}

carregar();

</script>

</body>
</html>
