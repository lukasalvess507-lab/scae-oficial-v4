<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Histórico</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a5f, #2a4d69);
  color: white;
  text-align: center;
  padding: 20px;
}

.container{
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
}

input, select{
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
}

canvas{
  margin-top: 15px;
}

.item{
  text-align: left;
  padding: 10px;
  border-bottom: 1px solid #ccc;
}

.data{
  font-size: 12px;
  color: gray;
}

button{
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

.btn{
  background: #f1f1f1;
  color: #333;
}

.voltar{
  background: #1f4d2e;
  color: white;
}
</style>
</head>

<body>

<h2>Histórico</h2>

<div class="container">

<input type="date" id="dataFiltro">

<select id="turmaFiltro">
  <option value="">Todas as turmas</option>
</select>

<canvas id="grafico"></canvas>

<div id="lista"></div>

<button class="btn" onclick="exportarPDF()">Exportar PDF</button>
<button class="btn" onclick="exportarGrafico()">Exportar Gráfico</button>
<button class="voltar" onclick="window.history.back()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const dataFiltro = document.getElementById("dataFiltro");
const turmaFiltro = document.getElementById("turmaFiltro");

const escolaId = localStorage.getItem("escola");

let dados = [];
let grafico;

async function carregar(){

  const snapshot = await getDocs(collection(db, "leituras"));

  const turmasSet = new Set();

  for(const docSnap of snapshot.docs){

    const leitura = docSnap.data();

    if(leitura.escolaId !== escolaId) continue;

    const alunosSnap = await getDocs(
      query(
        collection(db, "alunos"),
        where("codigo", "==", leitura.codigo),
        where("escolaId", "==", escolaId)
      )
    );

    alunosSnap.forEach(alunoDoc => {

      const aluno = alunoDoc.data();

      dados.push({
        ...aluno,
        data: leitura.data
      });

      turmasSet.add(aluno.turma);

    });
  }

  turmasSet.forEach(t => {
    const op = document.createElement("option");
    op.value = t;
    op.textContent = t;
    turmaFiltro.appendChild(op);
  });

  atualizarTela();
}

function atualizarTela(){

  const data = dataFiltro.value;
  const turma = turmaFiltro.value;

  lista.innerHTML = "";

  const turmas = {};

  dados.forEach(item => {

    if(data && item.data !== data) return;
    if(turma && item.turma !== turma) return;

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <strong>${item.codigo} - ${item.nome}</strong>
      <div>${item.turma}</div>
      <div class="data">${item.data}</div>
    `;

    lista.appendChild(div);

    if(!turmas[item.turma]) turmas[item.turma] = 0;
    turmas[item.turma]++;
  });

  criarGrafico(turmas);
}

function criarGrafico(turmas){

  const labels = Object.keys(turmas);
  const valores = Object.values(turmas);

  if(grafico) grafico.destroy();

  grafico = new Chart(document.getElementById("grafico"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: valores
      }]
    }
  });
}

dataFiltro.addEventListener("change", atualizarTela);
turmaFiltro.addEventListener("change", atualizarTela);

function exportarPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const data = dataFiltro.value;
  const turma = turmaFiltro.value;

  let y = 10;

  doc.text("Relatório de Leituras", 10, y);
  y += 10;

  doc.text(`Data: ${data || "Todas"}`, 10, y);
  y += 8;

  doc.text(`Turma: ${turma || "Todas"}`, 10, y);
  y += 10;

  dados.forEach(item => {

    if(data && item.data !== data) return;
    if(turma && item.turma !== turma) return;

    doc.text(
      `${item.codigo} - ${item.nome} | ${item.turma} | ${item.data}`,
      10,
      y
    );

    y += 8;

    if(y > 280){
      doc.addPage();
      y = 10;
    }

  });

  doc.save("relatorio.pdf");
}

function exportarGrafico(){

  const canvas = document.getElementById("grafico");
  const imagem = canvas.toDataURL("image/png");

  const link = document.createElement("a");
  link.href = imagem;
  link.download = "grafico.png";
  link.click();
}

carregar();

</script>

</body>
</html>
