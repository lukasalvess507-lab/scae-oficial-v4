<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a5f, #2a4d69);
  color: white;
  text-align: center;
  padding: 20px;
}

.container{
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
}

canvas{
  margin-top: 20px;
}

.ranking{
  text-align: left;
  margin-top: 20px;
}

.item{
  padding: 8px;
  border-bottom: 1px solid #ccc;
}

button{
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
  background: #1f4d2e;
  color: white;
}
</style>

</head>

<body>

<h2>S.C.A.E</h2>
<p>Dashboard</p>

<div class="container">

<h3>Alunos por dia</h3>
<canvas id="graficoDia"></canvas>

<h3>Alunos por turma</h3>
<canvas id="graficoTurma"></canvas>

<h3>Ranking de turmas</h3>
<div id="ranking"></div>

<button onclick="window.history.back()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const escolaId = localStorage.getItem("escola");
const hoje = new Date().toISOString().split("T")[0];

async function carregar(){

  const q = query(
    collection(db, "leituras"),
    where("data", "==", hoje),
    where("escolaId", "==", escolaId)
  );

  const snapshot = await getDocs(q);

  let total = 0;
  const turmas = {};

  for(const docSnap of snapshot.docs){

    const leitura = docSnap.data();
    const codigo = leitura.codigo;

    const alunosSnap = await getDocs(
      query(
        collection(db, "alunos"),
        where("codigo", "==", codigo),
        where("escolaId", "==", escolaId)
      )
    );

    alunosSnap.forEach(alunoDoc => {

      const aluno = alunoDoc.data();
      const turma = aluno.turma;

      if(!turmas[turma]) turmas[turma] = 0;

      turmas[turma]++;
      total++;

    });
  }

  criarGraficos(turmas, total);
}

function criarGraficos(turmas, total){

  const labels = Object.keys(turmas);
  const valores = Object.values(turmas);

  // GRÁFICO DE BARRA (total do dia)
  new Chart(document.getElementById("graficoDia"), {
    type: "bar",
    data: {
      labels: ["Hoje"],
      datasets: [{
        label: "Alunos por dia",
        data: [total]
      }]
    }
  });

  // GRÁFICO DE PIZZA
  new Chart(document.getElementById("graficoTurma"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: valores
      }]
    }
  });

  // RANKING
  const ranking = document.getElementById("ranking");

  const ordenado = Object.entries(turmas)
    .sort((a,b) => b[1] - a[1]);

  ordenado.forEach(([turma, qtd]) => {

    const div = document.createElement("div");
    div.className = "item";
    div.textContent = `${turma}: ${qtd} alunos`;

    ranking.appendChild(div);
  });
}

carregar();

</script>

</body>
</html>
