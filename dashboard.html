<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a5f, #2a4d69);
  color: white;
  text-align: center;
  padding: 20px;
}

.container{
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
}

.total{
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 20px;
}

.item{
  text-align: left;
  margin-bottom: 10px;
}

.barra{
  height: 10px;
  background: #4caf50;
  border-radius: 5px;
}

button{
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
  background: #1f4d2e;
  color: white;
}
</style>

</head>

<body>

<h2>Dashboard</h2>

<div class="container">

<div class="total" id="total">0</div>

<div id="lista"></div>

<button onclick="window.history.back()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const totalDiv = document.getElementById("total");

const escolaId = localStorage.getItem("escola");
const hoje = new Date().toISOString().split("T")[0];

async function carregarDashboard(){

  const q = query(
    collection(db, "leituras"),
    where("data", "==", hoje),
    where("escolaId", "==", escolaId)
  );

  const snapshot = await getDocs(q);

  let total = 0;
  const turmas = {};

  for(const docSnap of snapshot.docs){

    const leitura = docSnap.data();
    const codigo = leitura.codigo;

    const alunosSnap = await getDocs(
      query(
        collection(db, "alunos"),
        where("codigo", "==", codigo),
        where("escolaId", "==", escolaId)
      )
    );

    alunosSnap.forEach(alunoDoc => {

      const aluno = alunoDoc.data();
      const turma = aluno.turma;

      if(!turmas[turma]){
        turmas[turma] = 0;
      }

      turmas[turma]++;
      total++;

    });
  }

  totalDiv.textContent = total + " leituras hoje";

  renderizarTurmas(turmas);
}

function renderizarTurmas(turmas){

  lista.innerHTML = "";

  const ordenado = Object.entries(turmas)
    .sort((a,b) => b[1] - a[1]);

  ordenado.forEach(([turma, quantidade]) => {

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <strong>${turma}</strong> - ${quantidade}
      <div class="barra" style="width:${quantidade * 20}px"></div>
    `;

    lista.appendChild(div);
  });
}

carregarDashboard();

</script>

</body>
</html>
