<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Importar Alunos</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg, #1e3a5f, #2a4d69);
  color: white;
  text-align: center;
  padding: 20px;
}

.container{
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
}

input{
  width: 100%;
  margin-top: 15px;
}

button{
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

.importar{
  background: #2d89ef;
  color: white;
}

.voltar{
  background: #1f4d2e;
  color: white;
}
</style>
</head>

<body>

<h2>Importar Alunos</h2>

<div class="container">

<p>Selecione a planilha Excel (.xlsx)</p>

<input type="file" id="arquivo" accept=".xlsx">

<button class="importar" onclick="importar()">Importar</button>
<button class="voltar" onclick="window.history.back()">Voltar</button>

<p id="status"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8ibst0QRuzqlfi4fiXZ4kt7h13SV-y24",
  authDomain: "scae-sistema.firebaseapp.com",
  projectId: "scae-sistema",
  storageBucket: "scae-sistema.appspot.com",
  messagingSenderId: "448013604838",
  appId: "1:448013604838:web:524511ee6c17ddfa0fe827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const escolaId = localStorage.getItem("escola");

async function importar(){

  const file = document.getElementById("arquivo").files[0];

  if(!file){
    alert("Selecione um arquivo");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e){

    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    let total = 0;

    for(const aluno of json){

      if(!aluno.codigo || !aluno.nome || !aluno.turma) continue;

      await addDoc(collection(db, "alunos"), {
        codigo: String(aluno.codigo),
        nome: aluno.nome,
        turma: aluno.turma,
        escolaId: escolaId
      });

      total++;
    }

    document.getElementById("status").innerText =
      `✅ ${total} alunos importados com sucesso!`;
  };

  reader.readAsArrayBuffer(file);
}

// 🔥 IMPORTANTE PRA FUNCIONAR NO BOTÃO
window.importar = importar;

</script>

</body>
</html>
